<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alquipc</title>
    <link rel="stylesheet" href="alquipc.css">
    <script src="alquipc.js"></script>
</head>
<body>
    
    <div id="container1">
        <h1>ALQUIPC</h1>
        <h3>ALQUILA TUS COMPUTADORES AQUI</h3>  
        <div class="container2">
            <div class="card1">
                <h4>Dentro de la ciudad</h4>
                <form action="">
                    <br></br>
                    <label for="">nombre (obligatorio)</label>
                    <br>
                    <input id="nombreDentroC" type="text">
                    <br><br>
                    <label for="">contacto</label>
                    <br>
                    <input type="text" placeholder="correo o número">
                    <br><br>
                    <label for="">locación</label>
                    <br>
                    <input id="location" type="text">
                    <br><br>
                    <label for="">computadores (obligatorio)</label>
                    <br>
                    <input id="cantidadDentroC" type="number" placeholder="cantidad">
                    <br><br>
                    <label for="">Dias de Alquiler (obligatorio)</label>
                    <br>
                    <input id="diasDentroC" type="number">
                    <br><br>
                    <button type="button" onclick="DentroCiudad()">Confirmar Alquiler</button>
                </form>
            </div>
            <div class="card2">
                <h4>Fuera de la ciudad</h4>
                <p>+ 5%</p>
                <form action="">
                    <label for="">nombre (obligatorio)</label>
                    <br>
                    <input id="nombreFueraC" type="text">
                    <br><br>
                    <label for="">contacto</label>
                    <br>
                    <input id="contact" type="text" placeholder="correo o número">
                    <br><br>
                    <label for="">locación</label>
                    <br>
                    <input id="location" type="text">
                    <br><br>
                    <label for="">computadores (obligatorio)</label>
                    <br>
                    <input id="cantidadFueraC" type="number" placeholder="cantidad">
                    <br><br>
                    <label for="">Dias de Alquiler (obligatorio)</label>
                    <br>
                    <input id="diasFueraC" type="number">
                    <br><br>
                    <button type="button" onclick="FueraCiudad()">Confirmar Alquiler</button>
                </form>
            </div>
            <div class="card3">
                <h4>Dentro del establecimiento</h4>
                <p>- 5%</p>
                <form action="">
                    <label for="">nombre (obligatorio)</label>
                    <br>
                    <input id="nombreDentroE" type="text">
                    <br><br>
                    <label for="">contacto</label>
                    <br>
                    <input type="text" placeholder="correo o número">
                    <br><br>
                    <label for="">computadores (obligatorio)</label>
                    <br>
                    <input id="cantidadDentroE" type="number" placeholder="cantidad">
                    <br><br>
                    <label for="">hora (obligatorio)</label>
                    <br>
                    <input id="horaAlquier" type="time">
                    <br><br>
                    <label for="">Dia de Alquiler (obligatorio)</label>
                    <br>
                    <input id="diaAlquiler" type="date">
                    <br><br>
                    <button type="button" onclick="DentroEstablecimiento()">Confirmar Alquiler</button>
                </form>
            </div>
        </div>
        <br>
        <hr style="width: 99%; height: 1px;">  
        <footer>
            <center>
            <p>©ALquilapc2026</p>
            <a href="#">politica y privacidad</a>
            <a href="#">terminos y condiciones</a>
            </center>
        </footer>
        <br>
    </div>

</body>
</html>
